<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Progress Bar</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    .box-item-round {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .progress {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: absolute;
      background-color: #ddd;
    }

    .progress-bar {
      width: 25%;
      height: 100%;
      border-radius: 50%;
      background-color: #0d6efd;
      text-align: center;
      line-height: 120px; /* Center text vertically */
      font-weight: bold;
      color: white;
    }
  </style>
</head>
<body>

  <div class="box-item-round">
    <div class="progress">
      <div class="progress-bar" role="progressbar" style="width: 25%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">50%</div>
    </div>
  </div>

</body>
</html>
